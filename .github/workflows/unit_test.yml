name: Unit Tests

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Flutter Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Configure git credentials for git dependencies
        run: git config --global url."https://x-access-token:${{ secrets.READ_ONLY_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Get dependencies
        working-directory: health_duel
        run: flutter pub get

      - name: Run unit tests
        working-directory: health_duel
        run: flutter test --reporter=expanded
