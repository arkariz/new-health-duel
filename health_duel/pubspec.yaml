name: health_duel
description: "Health Duel - Social 24-hour step-count competition app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Core Packages (Git Dependencies - See ADR-007)
  exception:
    git:
      url: https://github.com/arkariz/flutter-package-core
      ref: 2.0.0
      path: packages/exception
  network:
    git:
      url: https://github.com/arkariz/flutter-package-core
      ref: 2.0.0
      path: packages/network
  storage:
    git:
      url: https://github.com/arkariz/flutter-package-core
      ref: 2.0.0
      path: packages/storage
  security:
    git:
      url: https://github.com/arkariz/flutter-package-core
      ref: 2.0.0
      path: packages/security
  firestore:
    git:
      url: https://github.com/arkariz/flutter-package-core
      ref: 2.0.0
      path: packages/firestore

  # External Libraries
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  envied: ^1.3.5
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  dartz: ^0.10.1
  equatable: ^2.0.7
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  timeago: ^3.7.0

  # Connectivity
  connectivity_plus: ^7.1.1

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_messaging: ^16.3.0
  cloud_firestore: ^6.5.0

  # Social Auth
  google_sign_in: ^6.2.2

  # Health
  health: ^13.1.3
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  envied_generator: ^1.3.5
  build_runner: ^2.7.1
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
